<!DOCTYPE html>
<html>
<head>
    <title>Add Policy</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">
            <h3>Add New Policy</h3>
        </div>

        <div class="card-body">
            {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}

        {% for category, message in messages %}

            <div class="alert alert-{{ category }}">
                {{ message }}
            </div>

        {% endfor %}

    {% endif %}
{% endwith %}
            <form method="POST">

                <div class="mb-3">
                    <label class="form-label">Policy Number</label>
                    <input type="text"
                           name="policy_number"
                           class="form-control"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Customer Name</label>
                    <input type="text"
                           name="customer_name"
                           class="form-control"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Policy Type</label>

                    <select name="policy_type"
                            class="form-select"
                            required>

                        <option value="">Select</option>
                        <option>Auto</option>
                        <option>Health</option>
                        <option>Life</option>
                        <option>Home</option>

                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Premium</label>

                    <input type="number"
                           step="0.01"
                           name="premium"
                           class="form-control"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Effective Date</label>

                    <input type="date"
                           name="effective_date"
                           class="form-control"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Expiry Date</label>

                    <input type="date"
                           name="expiry_date"
                           class="form-control"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">State</label>

                    <input type="text"
                           name="state"
                           class="form-control"
                           required>
                </div>

                <button class="btn btn-success">
                    Save Policy
                </button>

                <a href="/policies"
                   class="btn btn-secondary">
                    Cancel
                </a>

            </form>

        </div>

    </div>

</div>

</body>
</html>
