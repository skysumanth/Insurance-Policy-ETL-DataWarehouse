<!DOCTYPE html>
<html>
<head>
    <title>Edit Policy</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-warning">
            <h3>Edit Policy</h3>
        </div>

        <div class="card-body">

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }}">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST">

                <div class="mb-3">
                    <label>Policy Number</label>
                    <input type="text"
                           name="policy_number"
                           class="form-control"
                           value="{{ policy.PolicyNumber }}"
                           required>
                </div>

                <div class="mb-3">
                    <label>Customer Name</label>
                    <input type="text"
                           name="customer_name"
                           class="form-control"
                           value="{{ policy.CustomerName }}"
                           required>
                </div>

                <div class="mb-3">
                    <label>Policy Type</label>

                    <select name="policy_type"
                            class="form-select"
                            required>

                        <option value="Auto"
                            {% if policy.PolicyType == 'Auto' %}selected{% endif %}>
                            Auto
                        </option>

                        <option value="Health"
                            {% if policy.PolicyType == 'Health' %}selected{% endif %}>
                            Health
                        </option>

                        <option value="Life"
                            {% if policy.PolicyType == 'Life' %}selected{% endif %}>
                            Life
                        </option>

                        <option value="Home"
                            {% if policy.PolicyType == 'Home' %}selected{% endif %}>
                            Home
                        </option>

                    </select>
                </div>

                <div class="mb-3">
                    <label>Premium</label>

                    <input type="number"
                           step="0.01"
                           name="premium"
                           class="form-control"
                           value="{{ policy.Premium }}"
                           required>
                </div>

                <div class="mb-3">
                    <label>Effective Date</label>

                    <input type="date"
                           name="effective_date"
                           class="form-control"
                           value="{{ policy.EffectiveDate }}"
                           required>
                </div>

                <div class="mb-3">
                    <label>Expiry Date</label>

                    <input type="date"
                           name="expiry_date"
                           class="form-control"
                           value="{{ policy.ExpiryDate }}"
                           required>
                </div>

                <div class="mb-3">
                    <label>State</label>

                    <input type="text"
                           name="state"
                           class="form-control"
                           value="{{ policy.State }}"
                           required>
                </div>

                <button class="btn btn-warning">
                    Update Policy
                </button>

                <a href="/policies"
                   class="btn btn-secondary">
                    Cancel
                </a>

            </form>

        </div>

    </div>

</div>

</body>
</html>
