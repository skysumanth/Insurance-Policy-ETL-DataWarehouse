<!DOCTYPE html>
<html>
<head>
    <title>Insurance Portal Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <h1 class="text-center mb-5">
        Insurance Policy Management Portal
    </h1>

    <div class="row">

        <div class="col-md-3">
            <div class="card text-center shadow">
                <div class="card-body">
                    <h5>Total Policies</h5>
                    <h2>{{ total }}</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card text-center shadow">
                <div class="card-body">
                    <h5>Active Policies</h5>
                    <h2>{{ active }}</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card text-center shadow">
                <div class="card-body">
                    <h5>Expired Policies</h5>
                    <h2>{{ expired }}</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card text-center shadow">
                <div class="card-body">
                    <h5>Added Today</h5>
                    <h2>{{ added_today }}</h2>
                </div>
            </div>
        </div>

    </div>

    <div class="text-center mt-5">

        <a href="/policies"
           class="btn btn-primary">
            View Policies
        </a>

        <a href="/policies/add"
           class="btn btn-success">
            Add Policy
        </a>

    </div>

</div>

</body>
</html>
